{% extends "admin_base.html" %}
{% block content %}
<style>
    :root {
        --brand-teal: #1c6b6b;
        --brand-gold: #d4a044;
        --brand-dark: #0d2b2b;
    }

    .login-container {
        height: 85vh;
        background: radial-gradient(circle at top right, rgba(28, 107, 107, 0.05), transparent),
                    radial-gradient(circle at bottom left, rgba(212, 160, 68, 0.05), transparent);
    }

    .login-card {
        width: 400px;
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .brand-logo-text {
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .login-input {
        background: #f8fafc;
        border: 2px solid transparent;
        padding: 0.8rem 1.2rem;
        border-radius: 1rem;
        transition: all 0.3s ease;
    }

    .login-input:focus {
        background: #fff;
        border-color: var(--brand-teal);
        box-shadow: 0 10px 20px rgba(28, 107, 107, 0.1);
        outline: none;
    }

    .btn-login {
        background: var(--brand-teal);
        color: white;
        font-weight: 600;
        padding: 0.8rem;
        border-radius: 1rem;
        border: none;
        transition: all 0.3s ease;
        box-shadow: 0 10px 20px rgba(28, 107, 107, 0.2);
    }

    .btn-login:hover {
        background: var(--brand-dark);
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(28, 107, 107, 0.3);
        color: white;
    }

    .login-footer {
        font-size: 0.85rem;
        color: #64748b;
    }

    .icon-box {
        width: 60px;
        height: 60px;
        background: var(--brand-gold);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        border-radius: 1.2rem;
        margin: 0 auto 1.5rem;
        box-shadow: 0 10px 15px rgba(212, 160, 68, 0.3);
    }
</style>

<div class="d-flex justify-content-center align-items-center login-container">
    <div class="card p-5 shadow-lg border-0 login-card">
        <div class="icon-box">
            <i class="fa-solid fa-shield-halved"></i>
        </div>

        <div class="text-center mb-4">
            <h3 class="brand-logo-text mb-1">
                <span style="color: var(--brand-teal);">Ponno</span>
                <span style="color: var(--brand-gold);">Sebaa</span>
            </h3>
            <p class="text-muted small">Secure Administrator Access</p>
        </div>

        <form method="POST">
            <div class="mb-3">
                <label class="small fw-bold text-teal mb-1 ms-2">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 pe-0 text-muted">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" name="user" class="form-control login-input shadow-none" placeholder="Enter admin ID" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="small fw-bold text-teal mb-1 ms-2">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0 pe-0 text-muted">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" name="pass" class="form-control login-input shadow-none" placeholder="••••••••" required>
                </div>
            </div>

            <button class="btn btn-login w-100 mb-3">
                <i class="fa-solid fa-right-to-bracket me-2"></i>Authenticate
            </button>
            
            <div class="text-center login-footer">
                <i class="fa-solid fa-circle-info me-1"></i> 
                Authorized Personnel Only
            </div>
        </form>
    </div>
</div>
{% endblock %}
